name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
      # pdfium is only needed for the PDF integration examples, not the unit tests.
      - name: Run core tests
        run: cargo test -p ekstre-core
