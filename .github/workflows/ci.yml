name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
      - name: Run core tests
        run: cargo test -p ekstre-core
      # Compile the full desktop app so macOS-specific breakage is caught before
      # tagging a release (compilation only — no pdfium/signing needed here).
      - name: Build the app (compile check)
        run: cargo build -p ekstre-desktop
