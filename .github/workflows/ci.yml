name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
      - name: Run core tests
        run: cargo test -p ekstre-core
      # Compile the full desktop app so platform-specific breakage is caught
      # before tagging a release (compilation only — no pdfium/signing needed).
      - name: Build the app (compile check)
        run: cargo build -p ekstre-desktop
