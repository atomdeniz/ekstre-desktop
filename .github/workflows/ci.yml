name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      # tauri-build checks that the bundled pdfium exists at compile time, so
      # fetch it even for the compile check.
      - name: Fetch libpdfium (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p src-tauri/resources/pdfium
          curl -sL "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium/7934/pdfium-mac-univ.tgz" -o pdfium.tgz
          mkdir pdfium-extract && tar xzf pdfium.tgz -C pdfium-extract
          cp pdfium-extract/lib/libpdfium.dylib src-tauri/resources/pdfium/libpdfium.dylib

      - name: Fetch pdfium.dll (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p src-tauri/resources/pdfium
          curl -sL "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium/7934/pdfium-win-x64.tgz" -o pdfium.tgz
          mkdir pdfium-extract && tar xzf pdfium.tgz -C pdfium-extract
          cp pdfium-extract/bin/pdfium.dll src-tauri/resources/pdfium/pdfium.dll

      - name: Install system dependencies (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          # libdbus-1-dev: keyring's secret-service backend links libdbus.
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libdbus-1-dev

      - name: Fetch libpdfium.so (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          mkdir -p src-tauri/resources/pdfium
          curl -sL "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium/7934/pdfium-linux-x64.tgz" -o pdfium.tgz
          mkdir pdfium-extract && tar xzf pdfium.tgz -C pdfium-extract
          cp pdfium-extract/lib/libpdfium.so src-tauri/resources/pdfium/libpdfium.so

      - name: Run core tests
        run: cargo test -p ekstre-core

      # Compile the full app so platform-specific breakage is caught before a
      # release tag (compilation only — no bundling or signing).
      - name: Build the app (compile check)
        run: cargo build --manifest-path src-tauri/Cargo.toml
