<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ekstre</title>
    <script src="theme.js"></script>
    <link rel="stylesheet" href="styles.css?v=3" />
  </head>
  <body class="blur">
    <header>
      <div class="bar">
        <h1>
          <svg class="mark" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="2.5" y="5" width="19" height="14" rx="4" />
            <path class="stripe" d="M2.5 9.5h19" />
            <path d="M6 15h4" />
          </svg>
          <span class="wordmark">ekstre</span>
        </h1>
        <div class="actions">
          <button id="toggle" class="ic" title="Tutarları göster/gizle" aria-label="Tutarları göster/gizle">
            <svg viewBox="0 0 24 24"><path d="M1.5 12S5 5 12 5s10.5 7 10.5 7S19 19 12 19 1.5 12 1.5 12Z"/><circle cx="12" cy="12" r="3.2"/></svg>
          </button>
          <button id="theme" class="ic" title="Açık/koyu tema" aria-label="Açık/koyu tema"></button>
          <button id="poll" class="ic" title="Tara" aria-label="Tara">
            <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 4v5h-5"/></svg>
          </button>
          <button id="settings" class="ic" title="Ayarlar" aria-label="Ayarlar">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1Z"/></svg>
          </button>
        </div>
      </div>
      <div class="tabs">
        <button id="tab-cards" class="tab active">Kartlar</button>
        <button id="tab-calendar" class="tab">Takvim</button>
      </div>
    </header>

    <main id="cards"></main>
    <section id="calendar" hidden></section>

    <p id="empty" class="empty" hidden>Henüz ekstre yok.</p>
    <p id="status" class="status"></p>

    <script type="module" src="app.js"></script>
  </body>
</html>
