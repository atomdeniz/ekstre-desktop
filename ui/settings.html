<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ekstre — Ayarlar</title>
    <script src="theme.js"></script>
    <link rel="stylesheet" href="styles.css?v=2" />
    <link rel="stylesheet" href="wizard.css?v=2" />
  </head>
  <body>
    <div class="wizard">
      <h1>Ayarlar</h1>
      <label>E-posta sağlayıcı
        <select id="provider"></select>
      </label>
      <p class="hint" id="pw-hint"></p>
      <label>E-posta adresi
        <input id="user" type="email" placeholder="ornek@gmail.com" />
      </label>
      <label>Uygulama şifresi
        <input id="password" type="password"
               placeholder="Değiştirmek için yeni şifre gir" />
      </label>
      <div id="server-fields" hidden>
        <label>Sunucu <input id="host" type="text" /></label>
        <label>Port <input id="port" type="number" value="993" /></label>
      </div>
      <details>
        <summary>Gelişmiş (IMAP klasörü)</summary>
        <label>Klasör <input id="mailbox" type="text" value="INBOX" /></label>
      </details>
      <div class="test">
        <button class="btn" id="test-btn">Bağlantıyı test et</button>
        <span id="test-result" class="result"></span>
      </div>

      <h1 class="section">Hatırlatma</h1>
      <label>Son ödemeden kaç gün önce hatırlatılsın
        <input id="reminder-days" type="number" min="0" max="30" value="3" />
      </label>
      <p class="hint">0 = son ödeme günü. Hatırlatma her ekstre için bir kez gönderilir.</p>

      <h1 class="section">Bankalar</h1>
      <p class="hint">Yalnızca seçtiğin bankaların ekstreleri taranır.</p>
      <div id="bank-list" class="bank-list"></div>

      <div class="nav">
        <button class="btn" id="cancel">İptal</button>
        <button class="btn primary" id="save">Kaydet</button>
      </div>
    </div>
    <script type="module" src="settings.js"></script>
  </body>
</html>
